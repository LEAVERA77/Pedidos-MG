# Despliegue estático a GitHub Pages (index.html, sw.js, etc.)
#
# Antes de que pase el primer deploy:
# 1. Repo → Settings → Secrets and variables → Actions → New repository secret
#    - NEON_CONNECTION_STRING = URI completa postgresql://... (obligatorio)
#    - EMAILJS_PUBLIC_KEY, EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID (opcional)
# 2. Settings → Pages → Build and deployment → Source = "GitHub Actions"
#
# Ejecutar: push a main, o pestaña Actions → "Deploy GitHub Pages" → Run workflow.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Generar config.json desde secretos
        env:
          NEON_CS: ${{ secrets.NEON_CONNECTION_STRING }}
          EJS_PK: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EJS_SV: ${{ secrets.EMAILJS_SERVICE_ID }}
          EJS_TPL: ${{ secrets.EMAILJS_TEMPLATE_ID }}
        run: |
          if [ -z "$NEON_CS" ]; then
            echo "::error::Falta el secret NEON_CONNECTION_STRING (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          jq -n \
            --arg cs "$NEON_CS" \
            --arg pk "${EJS_PK:-}" \
            --arg sv "${EJS_SV:-}" \
            --arg tpl "${EJS_TPL:-}" \
            '{neon:{connectionString:$cs},emailjs:{publicKey:$pk,serviceId:$sv,templateId:$tpl},app:{version:"2.0.0"}}' \
            > config.json
          echo "OK: config.json generado (sin imprimir contenido)."

      - name: Quitar metadatos Git del artefacto
        run: rm -rf .git

      - name: Subir sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
