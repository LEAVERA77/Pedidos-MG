# Patrón oficial GitHub: job build (artefacto) + job deploy (solo deploy-pages).
# Secret obligatorio: NEON_CONNECTION_STRING (Settings → Secrets → Actions).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Generar config.json desde secretos
        env:
          NEON_CS: ${{ secrets.NEON_CONNECTION_STRING }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          EJS_PK: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EJS_SV: ${{ secrets.EMAILJS_SERVICE_ID }}
          EJS_TPL: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          ADMIN_RECOVERY_KEY: ${{ secrets.ADMIN_RECOVERY_KEY }}
        run: |
          if [ -z "$NEON_CS" ]; then
            echo "::error::Falta el secret NEON_CONNECTION_STRING en Settings → Secrets and variables → Actions."
            exit 1
          fi
          jq -n \
            --arg cs "$NEON_CS" \
            --arg api "${API_BASE_URL:-}" \
            --arg pk "${EJS_PK:-}" \
            --arg sv "${EJS_SV:-}" \
            --arg tpl "${EJS_TPL:-}" \
            --arg ark "${ADMIN_RECOVERY_KEY:-}" \
            '{neon:{connectionString:$cs},api:{baseUrl:$api},emailjs:{publicKey:$pk,serviceId:$sv,templateId:$tpl},admin:{recoveryKey:$ark},app:{version:"2.0.0"}}' \
            > config.json
          echo "OK: config.json generado."

      - name: Preparar carpeta publicable
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html sw.js styles.css app.js map.js offline.js config.example.json config.json dist/
          if [ -d privacy ]; then mkdir -p dist/privacy && cp -r privacy/* dist/privacy/; fi
          [ -f README.md ] && cp README.md dist/ || true
          [ -f SECURITY.md ] && cp SECURITY.md dist/ || true
          [ -f COPYRIGHT.md ] && cp COPYRIGHT.md dist/ || true

      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
